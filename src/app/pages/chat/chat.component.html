<div class="chat-wrapper">
  <div class="chat-container">
    <div
      *ngFor="let msg of messages"
      class="message"
      [class.user]="msg.sender === 'user'"
      [class.chai]="msg.sender === 'chai'"
    >
      <!-- Message text: ChaiGPT replies are Markdown → render as HTML;
           user messages stay plain text -->
      <span
        *ngIf="msg.sender === 'chai'; else plainText"
        class="md-body"
        [innerHTML]="msg.text | markdown"
      ></span>
      <ng-template #plainText>{{ msg.text }}</ng-template>

      <!-- Action buttons (only for ChaiGPT messages) -->
      <div *ngIf="msg.sender === 'chai'" class="msg-actions">
        <button type="button" (click)="copyMessage(msg)">
          {{ copiedId === msg.id ? '✅ Copied' : '📋 Copy' }}
        </button>
        <button type="button" (click)="shareMessage(msg)">🔗 Share</button>
        <button
          *ngIf="msg.allowReadMore"
          type="button"
          (click)="openInChatGPT(msg.text)"
        >
          ↗ Open
        </button>
      </div>
    </div>

    <!-- Typing indicator -->
    <div *ngIf="isTyping" class="typing-indicator">
      ☕ chai ban rahi hai…
    </div>

    <!-- Scroll anchor -->
    <div #bottomAnchor></div>
  </div>

  <form class="input-bar" (submit)="sendMessage(); $event.preventDefault()">
    <textarea
      [(ngModel)]="inputText"
      name="chatInput"
      placeholder="Bol bhai…"
      rows="1"
      autocomplete="off"
      (input)="autoResize($event)"
      (keydown)="handleKeydown($event)"
    ></textarea>

    <!-- Send when idle, Stop while generating -->
    <button *ngIf="!isGenerating" type="submit" aria-label="Send">➤</button>
    <button
      *ngIf="isGenerating"
      type="button"
      class="stop-btn"
      (click)="stopGenerating()"
      aria-label="Stop"
    >
      ⏹
    </button>
  </form>
</div>
<div *ngIf="showConfirm" class="confirm-overlay">
  <div class="confirm-box">
    <p>Start a new chat?</p>
    <span class="subtext">
      This will clear your current conversation.
    </span>

    <div class="actions">
      <button class="danger" (click)="confirmNewChat()">
        Yes, start new
      </button>
      <button (click)="cancelNewChat()">Cancel</button>
    </div>
  </div>
</div>
